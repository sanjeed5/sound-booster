<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sound Booster</title>
  <style>
    :root {
      --accent: #6366f1;
      --accent-strong: #4f46e5;
      --bg: #0f0f12;
      --surface: #1a1a20;
      --border: #2a2a33;
      --text: #f5f5f7;
      --muted: #9ca3af;
      --warn: #f59e0b;
      --ok: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      width: 280px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 14px;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .site {
      font-size: 11px;
      color: var(--muted);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: rtl;
      text-align: right;
    }

    .level {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .level-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .level-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .level-value.boost { color: var(--accent); }
    .level-value.high { color: var(--warn); }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      outline: none;
      margin: 4px 0 6px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .ticks {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: #23232c;
      border-color: #3a3a45;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      cursor: pointer;
    }

    .info {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      font-style: italic;
      cursor: help;
      user-select: none;
      line-height: 1;
    }

    .info:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .switch {
      position: relative;
      width: 32px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.15s;
    }

    .switch.on {
      background: var(--accent);
    }

    .switch.on::after {
      transform: translateX(14px);
    }

    .status {
      margin-top: 12px;
      padding: 8px 10px;
      font-size: 11px;
      text-align: center;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status.ok { color: var(--ok); border-color: rgba(34,197,94,0.3); }
    .status.warn { color: var(--warn); border-color: rgba(245,158,11,0.3); }
    .status.err { color: var(--danger); border-color: rgba(239,68,68,0.3); }

    .status a {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sound Booster</h1>
    <span class="site" id="site"></span>
  </header>

  <div class="level">
    <span class="level-label">Boost</span>
    <span class="level-value" id="volLabel">1.0x</span>
  </div>

  <input type="range" id="volume" min="0" max="6" step="0.1" value="1">
  <div class="ticks">
    <span>0x</span><span>1x</span><span>2x</span><span>3x</span><span>4x</span><span>5x</span><span>6x</span>
  </div>

  <div class="row">
    <button id="resetBtn">Reset</button>
    <button id="applyBtn" class="primary">Apply 2x</button>
  </div>

  <div class="toggle">
    <span class="toggle-label">
      Soft limiter
      <span class="info" tabindex="0" role="button" aria-label="What is the soft limiter?"
        title="Catches loud peaks before they clip, so heavy boost stays clean instead of crackly. Leave on unless you want raw audio.">i</span>
    </span>
    <div class="switch on" id="limiterSwitch" role="switch" aria-checked="true" tabindex="0"></div>
  </div>

  <div class="status" id="status">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
